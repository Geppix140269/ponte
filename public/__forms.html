<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ponte — form registry</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <!--
      This file exists so Netlify's build-time bot can detect the site's forms.
      The live React components POST to /__forms.html with a matching `form-name`.
      Do not link to this page; it is not user-facing.
    -->

    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <select name="interest">
        <option value=""></option>
      </select>
      <textarea name="message"></textarea>
    </form>

    <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="newsletter" />
      <input name="bot-field" />
      <input type="email" name="email" />
    </form>

    <form name="marketplace" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="marketplace" />
      <input name="bot-field" />
      <input type="email" name="email" />
    </form>

    <form name="partners" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="partners" />
      <input name="bot-field" />
      <input type="email" name="email" />
    </form>
  </body>
</html>
